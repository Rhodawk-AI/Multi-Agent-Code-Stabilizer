version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# Rhodawk AI Code Stabilizer — Production Compose
#
# FIXES vs prior version:
#   • Added postgres service — was missing despite PostgreSQL being the
#     production default. First-time deployers silently fell back to SQLite.
#   • Removed RHODAWK_DEV_AUTH=1 from environment block (was an open-auth
#     landmine in production deployments).
#   • rhodawk-api and rhodawk-worker both depend on postgres with health check.
#   • postgres data volume persists across restarts.
#   • SEC-1 FIX: added /var/run/docker.sock volume mount to rhodawk-worker.
#     Without this mount, shutil.which("docker") returns None inside the
#     container (docker CLI not on PATH), test_runner._use_sandbox is False,
#     and all LLM-generated test code runs unsandboxed on the host with full
#     filesystem and network access — silently bypassing the SEC-03 sandbox.
#   • SEC-5 FIX: .dockerignore now excludes .env from the build context.
# ──────────────────────────────────────────────────────────────────────────────

services:

  rhodawk-api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - RHODAWK_ENV=production
      # DO NOT set RHODAWK_DEV_AUTH here. Put it in .env for local dev only.
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000 --workers 2
    # SEC-03 FIX: Docker socket removed from rhodawk-api.
    # The API service does not directly spin up test containers — that is the
    # worker's responsibility. Mounting the socket here meant any code path
    # reaching docker.from_env() in the API process (e.g. via an adversarial
    # repository submitted through the upload endpoint) had near-root host
    # privileges and could escape the container entirely:
    #   docker run -v /:/host -it alpine chroot /host
    # Combined with the exec() SEC-01 vector this was a full host compromise path.
    # The worker retains the socket because it genuinely needs it for sandboxed
    # test execution. See rhodawk-worker volumes comment for threat model and
    # recommended mitigations (rootless Docker / gVisor).
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  rhodawk-worker:
    build: .
    env_file: .env
    environment:
      - RHODAWK_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      celery -A workers.celery_app worker
      --loglevel=info -Q read,fix,gate --concurrency=4
    # SEC-1 FIX: mount Docker socket so test_runner.py can spin up sandboxed
    # containers for LLM-generated test code. Without this mount,
    # shutil.which("docker") returns None inside the container (the docker CLI
    # binary is present from apt-get install docker.io in the Dockerfile, but
    # it cannot communicate with the daemon without the socket), causing
    # self._use_sandbox to be set False and all test execution to run
    # unsandboxed on the host — silently bypassing SEC-03.
    #
    # SECURITY — Docker socket threat model (SEC-5)
    # /var/run/docker.sock grants near-root host privileges. Any process inside
    # the container with socket access can run:
    #   docker run -v /:/host -it alpine chroot /host
    # and obtain full root filesystem access on the host.
    #
    # Mitigations in this deployment:
    #   • rhodawk runs as non-root user (rhodawk) inside the container
    #   • The sandbox image runs --user nobody --read-only --network none
    #   • test_runner.py aborts (CRITICAL log, returncode=-1) rather than
    #     falling back to unsandboxed execution if docker run fails
    #
    # For higher-security environments, choose one of:
    #   A. Rootless Docker (recommended):
    #      https://docs.docker.com/engine/security/rootless/
    #      Replace the volume mount with the rootless socket path:
    #        - ${XDG_RUNTIME_DIR}/docker.sock:/var/run/docker.sock
    #
    #   B. gVisor runtime (strongest isolation):
    #      Add to daemon.json: {"runtimes": {"runsc": {"path": "/usr/bin/runsc"}}}
    #      Add to this service: runtime: runsc
    #
    #   C. Disable test sandbox entirely (loses SEC-03 protection):
    #      Add to environment: RHODAWK_TEST_SANDBOX_DISABLED=1
    #      test_runner.py will log WARNING and skip test execution rather
    #      than run LLM-generated code unsandboxed.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  # FIX: PostgreSQL was entirely absent from the previous compose file.
  # The controller defaults to PostgreSQL but there was no container,
  # causing a silent fallback to SQLite on every `docker-compose up`.
  #
  # ADD-05 FIX: credentials are no longer hardcoded. POSTGRES_USER,
  # POSTGRES_PASSWORD, and POSTGRES_DB are read from the .env file
  # (loaded via env_file: .env on the api/worker services, and via
  # the ${VAR:-default} syntax here for the postgres service itself).
  #
  # Set these in .env before first run:
  #   POSTGRES_USER=rhodawk
  #   POSTGRES_PASSWORD=<generate: python -c "import secrets; print(secrets.token_hex(32))">
  #   POSTGRES_DB=rhodawk
  #   RHODAWK_PG_DSN=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  #
  # The defaults below will cause a startup WARNING from the controller
  # if left unchanged (RHODAWK_PG_DSN will not be set and the controller
  # will log "RHODAWK_PG_DSN not set — falling back to SQLite").
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-rhodawk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env — see comment above}
      POSTGRES_DB:       ${POSTGRES_DB:-rhodawk}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rhodawk} -d ${POSTGRES_DB:-rhodawk}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.0
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    # ADD-2 FIX: Redis previously ran with no authentication — any process on
    # the Docker network could read/write the Celery task queue, injecting
    # arbitrary tasks or reading task payloads (which include file contents and
    # fix diffs).  Added --requirepass so the queue requires a password.
    # Set REDIS_PASSWORD in .env before first run:
    #   python -c "import secrets; print(secrets.token_hex(16))"
    # Update REDIS_URL in .env to:
    #   REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env} --save 60 1 --loglevel warning
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  # ── Gap 1: Joern Code Property Graph server ───────────────────────────────
  # Joern builds a CPG (AST + CFG + PDG) for the entire codebase.
  # This replaces vector similarity for context selection: instead of finding
  # semantically similar code we compute the backward program slice — the
  # functions that CAUSED the bug, regardless of semantic similarity.
  #
  # Supports: C/C++, Java, Python, JavaScript, TypeScript, Go, Kotlin, PHP
  # License: Apache 2.0
  # Docs: https://docs.joern.io
  #
  # The repo is mounted into the container at /repo so Joern can parse it.
  # Set JOERN_REPO_PATH in .env to the HOST path of the repo being audited.
  joern:
    image: ghcr.io/joernio/joern:latest
    ports:
      - "8080:8080"
    environment:
      - JOERN_SERVER_HOST=0.0.0.0
      - JOERN_SERVER_PORT=8080
    volumes:
      # Mount the target repository so Joern can parse it.
      # ${JOERN_REPO_PATH} = absolute path to the repo on the host.
      # Override in .env: JOERN_REPO_PATH=/path/to/your/repo
      - ${JOERN_REPO_PATH:-/tmp/rhodawk_empty}:/repo:ro
      - joern_workspace:/root/.joern
    command: >
      joern
      --server
      --server-host 0.0.0.0
      --server-port 8080
      --max-heap-size 8g
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/v1/projects"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    # Joern needs significant memory for large codebases
    mem_limit: 10g
    mem_reservation: 4g

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  ollama_models:
  grafana_data:
  # Gap 1: Joern CPG workspace (persists the built CPG across restarts)
  # Avoids full CPG rebuild on every container restart — only changed files
  # are re-parsed using Joern's incremental overlay mechanism.
  joern_workspace:
