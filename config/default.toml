# ─────────────────────────────────────────────────────────────────────────────
# MACS — Multi-Agent Code Stabilizer
# Default Configuration
# ─────────────────────────────────────────────────────────────────────────────
# All values can be overridden by environment variables.
# See config/loader.py for the full override map.
# ─────────────────────────────────────────────────────────────────────────────

# Domain mode: general | finance | medical | military | embedded
# Finance: PCI-DSS, no float on monetary values, atomic balance ops
# Medical: IEC 62304, HIPAA, dosage safety
# Military: MISRA-C, DO-178C, no dynamic alloc, no goto
# Embedded: RTOS rules: no dynamic alloc, bounded loops, no stdio
domain_mode = "general"

# ─── Models ──────────────────────────────────────────────────────────────────
[models]
primary               = "claude-sonnet-4-20250514"
triage_model          = "claude-haiku-4-5-20251001"
audit_model           = "claude-sonnet-4-20250514"
fix_model             = "claude-sonnet-4-20250514"
critical_fix_model    = "claude-opus-4-20250514"
fallbacks             = ["gpt-4o-mini", "ollama/qwen2.5-coder:32b"]
cross_validate_critical = true

# ─── Loop parameters ─────────────────────────────────────────────────────────
[loop]
max_cycles             = 50
cost_ceiling_usd       = 50.0
concurrency            = 4
chunk_concurrency      = 4
stall_threshold        = 2
regression_threshold   = 0.10
max_fix_attempts       = 3
parallel_fixes         = true

# ─── Chunking thresholds ─────────────────────────────────────────────────────
[chunking]
threshold_full         = 200    # < 200 lines → FULL (single chunk)
threshold_half         = 1_000  # < 1 000 lines → HALF (two chunks)
threshold_ast          = 5_000  # < 5 000 lines → AST_NODES
threshold_skeleton     = 20_000 # < 20 000 lines → SKELETON
# ≥ 20 000 lines → SKELETON_ONLY

# ─── Direct audit threshold ──────────────────────────────────────────────────
[auditing]
direct_audit_line_threshold = 5_000   # files below this are audited from source
validate_findings           = true    # run hallucination filter on LLM findings
audit_batch_size            = 20      # files per LLM audit call

# ─── Static analysis ─────────────────────────────────────────────────────────
[static_analysis]
run_ruff          = true
run_mypy          = true
run_semgrep       = true
run_bandit        = true
fail_on_warning   = false
timeout_s         = 60

# ─── Dependency graph ────────────────────────────────────────────────────────
[graph]
enabled                     = true
backend                     = "networkx"    # networkx | neo4j
min_centrality_threshold    = 0.0
# Neo4j settings (only used when backend = "neo4j")
neo4j_uri                   = "bolt://localhost:7687"
neo4j_user                  = "neo4j"
neo4j_password              = ""

# ─── Formal verification ─────────────────────────────────────────────────────
[formal_verification]
enabled     = false        # enable for finance / medical / military
solver      = "z3"
timeout_s   = 30
# Only run formal verification when domain_mode is in this list
domains     = ["finance", "medical", "military"]

# ─── Test runner ─────────────────────────────────────────────────────────────
[test_runner]
enabled     = true         # run target repo's test suite after each fix commit
timeout_s   = 300          # 5 minutes

# ─── Brain storage ───────────────────────────────────────────────────────────
[brain]
backend               = "sqlite"
db_path               = ".stabilizer/brain.db"
vector_store_enabled  = false
vector_store_path     = ".stabilizer/vectors"
vector_embedding_model = "all-MiniLM-L6-v2"

# ─── Patrol ──────────────────────────────────────────────────────────────────
[patrol]
poll_interval_s           = 60
task_timeout_min          = 15
rejection_rate_threshold  = 0.50
cost_warn_pct             = 0.80

# ─── GitHub integration ───────────────────────────────────────────────────────
[github]
base_branch    = "main"
branch_prefix  = "stabilizer"
auto_merge     = false

# ─── API server ──────────────────────────────────────────────────────────────
[api]
host    = "0.0.0.0"
port    = 8000
reload  = false

# ─── Consensus ───────────────────────────────────────────────────────────────
[consensus]
# These match orchestrator/consensus.py DEFAULT_RULES
# Override here to raise/lower the bar per severity
critical_min_agents         = 2
critical_confidence_floor   = 0.85
critical_requires_security  = true
major_min_agents            = 2
major_confidence_floor      = 0.70
minor_min_agents            = 1
minor_confidence_floor      = 0.50
high_centrality_threshold   = 0.70
high_centrality_multiplier  = 1.20

# ─── Plugin paths ─────────────────────────────────────────────────────────────
[plugins]
paths = []

# ─── Code Property Graph — Gap 1 (Joern integration) ────────────────────────
#
# Joern builds a full Code Property Graph (CPG) combining:
#   • AST  — abstract syntax tree
#   • CFG  — control flow graph
#   • PDG  — program dependence graph (data + control flow)
#
# The CPG enables three graph types used for causal context selection:
#   1. Call graph       → which functions CALL the buggy function (depth 1–3)
#   2. Data flow graph  → which variables and values FLOW INTO the crash site
#   3. Type flow graph  → which callers VIOLATE the type contract (no null guard)
#
# Together these replace vector similarity for context selection in FixerAgent:
# instead of "code that looks similar", the agent receives "code that CAUSED
# the bug", including cross-file, cross-service causal chains that embeddings
# cannot detect.
#
# Quick start:
#   export JOERN_REPO_PATH=/path/to/repo-being-audited
#   docker-compose up joern
#   # CPG is built automatically on first run (5–30 min for 10M lines)
#
# All settings here map 1-to-1 to StabilizerConfig fields (config/loader.py).
# They can all be overridden via environment variables (JOERN_URL, etc.).
[cpg]

# Master switch.  Set false to skip Joern entirely and fall back to the
# hybrid BM25+dense retrieval path (same quality as before Gap 1).
enabled                = true

# Joern HTTP server address.  Matches the docker-compose service port.
# Override with: JOERN_URL=http://joern-host:8080
joern_url              = "http://localhost:8080"

# Absolute host path of the repository to audit.  The docker-compose.yml
# mounts this at /repo inside the Joern container (read-only).
# Override with: JOERN_REPO_PATH=/absolute/path/to/repo
# Leave blank to default to StabilizerConfig.repo_root.
joern_repo_path        = ""

# Joern project name.  Re-using the same name across runs avoids a full
# CPG rebuild — Joern loads the persisted workspace from joern_workspace volume.
joern_project_name     = "rhodawk"

# Functions in the CPG impact set above this count trigger human review
# instead of autonomous commit.  Mirrors PlannerAgent.BLAST_RADIUS_HUMAN_THRESHOLD.
# Increase for large active codebases where many callers are expected.
blast_radius_threshold = 50

# Maximum number of causal functions included in a single context slice.
# Higher values give the LLM more context at the cost of more tokens.
# At 10M lines the relevant slice is typically 20–80 functions.
max_slice_nodes        = 50

# Maximum number of files from which source lines are loaded per slice.
# Caps I/O at context-selection time.  Increase for highly modular codebases
# where a bug spans many small files.
max_files_in_slice     = 30
