<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenMOSS — Stabilizer Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #050810;
      --surface:  #0c1120;
      --border:   #1a2540;
      --accent:   #00ff88;
      --warn:     #ffb800;
      --danger:   #ff4466;
      --info:     #4488ff;
      --text:     #c8d4e8;
      --muted:    #4a5568;
      --mono:     'Space Mono', monospace;
      --sans:     'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: 56px 1fr;
      grid-template-columns: 240px 1fr 320px;
      grid-template-areas:
        "header header header"
        "sidebar main events";
      height: 100vh;
    }

    /* ── Header ── */
    header {
      grid-area: header;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
    }
    .logo span { color: var(--text); }
    .status-badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 2px;
      border: 1px solid currentColor;
      letter-spacing: 1px;
    }
    .status-badge.running  { color: var(--accent); border-color: var(--accent); animation: pulse 2s infinite; }
    .status-badge.halted   { color: var(--warn); }
    .status-badge.done     { color: var(--info); }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .cost { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .cost strong { color: var(--warn); }

    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.5 } }

    /* ── Sidebar ── */
    .sidebar {
      grid-area: sidebar;
      border-right: 1px solid var(--border);
      padding: 16px;
      overflow-y: auto;
      background: var(--surface);
    }
    .sidebar-section { margin-bottom: 24px; }
    .section-title {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .score-display {
      text-align: center;
      padding: 16px 0;
    }
    .score-num {
      font-family: var(--mono);
      font-size: 48px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .score-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

    .severity-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
    }
    .severity-name { font-size: 12px; }
    .severity-count {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
    }
    .sev-critical { color: var(--danger); }
    .sev-major    { color: var(--warn); }
    .sev-minor    { color: var(--info); }
    .sev-info     { color: var(--muted); }

    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      margin: 8px 0;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.5s ease;
    }
    .cycle-info { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: right; margin-top: 4px; }

    /* ── Main ── */
    main {
      grid-area: main;
      padding: 20px;
      overflow-y: auto;
    }
    .agents-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px;
      position: relative;
      overflow: hidden;
    }
    .agent-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .agent-card.reader::before    { background: var(--info); }
    .agent-card.auditor::before   { background: var(--danger); }
    .agent-card.fixer::before     { background: var(--warn); }
    .agent-card.reviewer::before  { background: var(--accent); }
    .agent-card.patrol::before    { background: var(--muted); }

    .agent-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .agent-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }
    .agent-card.reader .agent-dot    { background: var(--info); }
    .agent-card.auditor .agent-dot   { background: var(--danger); animation: pulse 1s infinite; }
    .agent-card.fixer .agent-dot     { background: var(--warn); }
    .agent-card.reviewer .agent-dot  { background: var(--accent); }
    .agent-card.patrol .agent-dot    { background: var(--muted); }

    .agent-name {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 1px;
    }
    .agent-status {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .agent-progress {
      margin-top: 8px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
    }

    /* Issues table */
    .issues-title {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      margin-bottom: 12px;
    }
    .issue-row {
      display: grid;
      grid-template-columns: 70px 1fr 80px;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn { from { opacity:0; transform:translateY(-4px) } to { opacity:1; transform:translateY(0) } }
    .issue-sev { font-family: var(--mono); font-size: 10px; font-weight: 700; }
    .issue-desc { color: var(--text); line-height: 1.4; }
    .issue-file { font-family: var(--mono); font-size: 10px; color: var(--muted); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Event Feed ── */
    .events-panel {
      grid-area: events;
      border-left: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
    }
    .events-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .ws-indicator {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
    }
    .ws-indicator.connected { background: var(--accent); animation: pulse 2s infinite; }

    .events-feed {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .event-item {
      padding: 6px 16px;
      font-size: 11px;
      line-height: 1.5;
      border-left: 2px solid transparent;
      transition: background 0.15s;
    }
    .event-item:hover { background: rgba(255,255,255,0.02); }
    .event-item.info     { border-left-color: var(--info); }
    .event-item.success  { border-left-color: var(--accent); }
    .event-item.warning  { border-left-color: var(--warn); }
    .event-item.error    { border-left-color: var(--danger); }

    .event-time {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      display: block;
    }
    .event-agent {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 700;
      margin-right: 6px;
    }
    .event-agent.READER   { color: var(--info); }
    .event-agent.AUDITOR  { color: var(--danger); }
    .event-agent.FIXER    { color: var(--warn); }
    .event-agent.REVIEWER { color: var(--accent); }
    .event-agent.PATROL   { color: var(--muted); }
    .event-msg { color: var(--text); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
<div class="layout">

  <!-- Header -->
  <header>
    <div class="logo">OPEN<span>MOSS</span></div>
    <div id="statusBadge" class="status-badge running">RUNNING</div>
    <div class="header-right">
      <div class="cost">Spend: <strong id="costDisplay">$0.0000</strong></div>
      <div id="runId" style="font-family:var(--mono);font-size:10px;color:var(--muted);">—</div>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="section-title">Audit Score</div>
      <div class="score-display">
        <div class="score-num" id="scoreNum">—</div>
        <div class="score-label">weighted issue score</div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="cycle-info" id="cycleInfo">cycle —/—</div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Issues</div>
      <div class="severity-row">
        <span class="severity-name">CRITICAL</span>
        <span class="severity-count sev-critical" id="critCount">0</span>
      </div>
      <div class="severity-row">
        <span class="severity-name">MAJOR</span>
        <span class="severity-count sev-major" id="majCount">0</span>
      </div>
      <div class="severity-row">
        <span class="severity-name">MINOR</span>
        <span class="severity-count sev-minor" id="minCount">0</span>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="section-title">Files</div>
      <div class="severity-row">
        <span class="severity-name">Read</span>
        <span class="severity-count" id="filesRead" style="color:var(--accent)">0</span>
      </div>
      <div class="severity-row">
        <span class="severity-name">Total</span>
        <span class="severity-count" id="filesTotal" style="color:var(--muted)">0</span>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main>
    <div class="agents-grid">
      <div class="agent-card reader">
        <div class="agent-header">
          <div class="agent-dot"></div>
          <div class="agent-name">READER</div>
        </div>
        <div class="agent-status" id="readerStatus">Waiting...</div>
        <div class="agent-progress" id="readerProgress"></div>
      </div>
      <div class="agent-card auditor">
        <div class="agent-header">
          <div class="agent-dot"></div>
          <div class="agent-name">AUDITOR</div>
        </div>
        <div class="agent-status" id="auditorStatus">Waiting...</div>
        <div class="agent-progress" id="auditorProgress"></div>
      </div>
      <div class="agent-card fixer">
        <div class="agent-header">
          <div class="agent-dot"></div>
          <div class="agent-name">FIXER</div>
        </div>
        <div class="agent-status" id="fixerStatus">Waiting...</div>
        <div class="agent-progress" id="fixerProgress"></div>
      </div>
      <div class="agent-card reviewer">
        <div class="agent-header">
          <div class="agent-dot"></div>
          <div class="agent-name">REVIEWER</div>
        </div>
        <div class="agent-status" id="reviewerStatus">Waiting...</div>
        <div class="agent-progress" id="reviewerProgress"></div>
      </div>
    </div>

    <div class="issues-title">RECENT ISSUES FOUND</div>
    <div id="issuesList"></div>
  </main>

  <!-- Event Feed -->
  <div class="events-panel">
    <div class="events-header">
      LIVE EVENTS
      <div class="ws-indicator" id="wsIndicator"></div>
    </div>
    <div class="events-feed" id="eventsFeed"></div>
  </div>

</div>

<script>
const RUN_ID = new URLSearchParams(window.location.search).get('run_id') || '';
const API    = window.location.origin;
let ws = null;
let initialScore = null;

function connectWS() {
  if (!RUN_ID) return;
  const wsUrl = `${API.replace('http','ws')}/ws/${RUN_ID}`;
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    document.getElementById('wsIndicator').classList.add('connected');
    document.getElementById('runId').textContent = RUN_ID.slice(0,8) + '...';
  };

  ws.onclose = () => {
    document.getElementById('wsIndicator').classList.remove('connected');
    setTimeout(connectWS, 3000); // auto-reconnect
  };

  ws.onmessage = (e) => {
    const evt = JSON.parse(e.data);
    if (evt === 'pong') return;
    handleEvent(evt);
  };

  // Keep-alive ping
  setInterval(() => ws && ws.readyState === 1 && ws.send('ping'), 15000);
}

function handleEvent(evt) {
  addEventToFeed(evt);
  updateAgentCard(evt);

  switch(evt.type) {
    case 'score_update':
      updateScore(evt.data);
      break;
    case 'issue_found':
      addIssueRow(evt.data);
      break;
    case 'cost_update':
      document.getElementById('costDisplay').textContent = `$${parseFloat(evt.data.total||0).toFixed(4)}`;
      break;
    case 'cycle_started':
      document.getElementById('cycleInfo').textContent = `cycle ${evt.data.cycle}/${evt.data.max}`;
      break;
    case 'stabilized':
      document.getElementById('statusBadge').textContent = 'STABILIZED';
      document.getElementById('statusBadge').className = 'status-badge done';
      break;
    case 'halted':
      document.getElementById('statusBadge').textContent = 'HALTED';
      document.getElementById('statusBadge').className = 'status-badge halted';
      break;
    case 'file_completed':
      const fr = parseInt(document.getElementById('filesRead').textContent) + 1;
      document.getElementById('filesRead').textContent = fr;
      break;
  }
}

function updateScore(data) {
  const score = data.score || 0;
  if (initialScore === null) initialScore = score;
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('critCount').textContent = data.critical || 0;
  document.getElementById('majCount').textContent  = data.major || 0;
  document.getElementById('minCount').textContent  = data.minor || 0;
  // Progress = how much we've reduced from initial
  const pct = initialScore > 0 ? Math.round((1 - score/initialScore)*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

function updateAgentCard(evt) {
  const agentMap = {
    'READER':   ['readerStatus',   'readerProgress'],
    'AUDITOR':  ['auditorStatus',  'auditorProgress'],
    'SECURITY': ['auditorStatus',  'auditorProgress'],
    'ARCHITECTURE': ['auditorStatus', 'auditorProgress'],
    'FIXER':    ['fixerStatus',    'fixerProgress'],
    'REVIEWER': ['reviewerStatus', 'reviewerProgress'],
  };
  const agent = evt.agent?.toUpperCase();
  if (!agent) return;
  const ids = agentMap[agent];
  if (!ids) return;
  document.getElementById(ids[0]).textContent = evt.message.slice(0, 80);
  if (evt.data?.progress) {
    document.getElementById(ids[1]).textContent = evt.data.progress;
  }
}

function addIssueRow(data) {
  const list = document.getElementById('issuesList');
  const sevColor = { CRITICAL:'var(--danger)', MAJOR:'var(--warn)', MINOR:'var(--info)' };
  const row = document.createElement('div');
  row.className = 'issue-row';
  row.innerHTML = `
    <span class="issue-sev" style="color:${sevColor[data.severity]||'var(--muted)'}">${data.severity}</span>
    <span class="issue-desc">${(data.description||'').slice(0,100)}</span>
    <span class="issue-file">${(data.file||'').split('/').pop()}</span>
  `;
  list.insertBefore(row, list.firstChild);
  if (list.children.length > 50) list.removeChild(list.lastChild);
}

function addEventToFeed(evt) {
  const feed = document.getElementById('eventsFeed');
  const item = document.createElement('div');
  const sevClass = { error:'error', critical:'error', warning:'warning', info:'info', success:'success' };
  item.className = `event-item ${sevClass[evt.severity]||'info'}`;
  const t = new Date(evt.timestamp).toLocaleTimeString();
  item.innerHTML = `
    <span class="event-time">${t}</span>
    <span class="event-agent ${evt.agent?.toUpperCase()}">${evt.agent||'SYS'}</span>
    <span class="event-msg">${evt.message?.slice(0,120)}</span>
  `;
  feed.insertBefore(item, feed.firstChild);
  if (feed.children.length > 200) feed.removeChild(feed.lastChild);
}

// Poll for stats every 10s as fallback
async function pollStats() {
  if (!RUN_ID) return;
  try {
    const rp = new URLSearchParams(window.location.search).get('repo_path') || '.';
    const r = await fetch(`${API}/api/runs/${RUN_ID}?repo_path=${encodeURIComponent(rp)}`);
    if (!r.ok) return;
    const d = await r.json();
    document.getElementById('filesTotal').textContent = d.files_total || 0;
    document.getElementById('filesRead').textContent  = d.files_read  || 0;
    if (d.score !== null) updateScore({ score: d.score, critical: d.critical, major: d.major, minor: d.minor });
    const cost = await fetch(`${API}/api/runs/${RUN_ID}/cost?repo_path=${encodeURIComponent(rp)}`);
    if (cost.ok) {
      const cd = await cost.json();
      document.getElementById('costDisplay').textContent = `$${(cd.total_cost_usd||0).toFixed(4)}`;
    }
  } catch {}
}

connectWS();
setInterval(pollStats, 10000);
pollStats();
</script>
</body>
</html>
