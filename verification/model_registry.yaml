independence_method: "prefix_family_mapping"
independence_note: >
  Independence is asserted by mapping model name prefixes to provider
  families (e.g. "qwen*" → "alibaba", "claude*" → "anthropic") and
  verifying that the fixer and reviewer belong to different families.
  This is string-based classification, NOT cryptographic model identity
  verification. For DO-178C DAL-A deployments requiring cryptographic
  assurance of model identity, populate the checksums section below
  with SHA-256 hashes of the actual model weight files in use.

checksums:
  - model: "qwen/qwen2.5-coder-32b-instruct"
    sha256: ""
    note: "UNPOPULATED — verify via: sha256sum model-weights.safetensors"
