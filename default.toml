# ─────────────────────────────────────────────────────────────────────────────
# MACS — Multi-Agent Code Stabilizer
# Default Configuration
# ─────────────────────────────────────────────────────────────────────────────
# All values can be overridden by environment variables.
# See config/loader.py for the full override map.
# ─────────────────────────────────────────────────────────────────────────────

# Domain mode: general | finance | medical | military | embedded
# Finance: PCI-DSS, no float on monetary values, atomic balance ops
# Medical: IEC 62304, HIPAA, dosage safety
# Military: MISRA-C, DO-178C, no dynamic alloc, no goto
# Embedded: RTOS rules: no dynamic alloc, bounded loops, no stdio
domain_mode = "general"

# ─── Models ──────────────────────────────────────────────────────────────────
[models]
primary               = "claude-sonnet-4-20250514"
triage_model          = "claude-haiku-4-5-20251001"
audit_model           = "claude-sonnet-4-20250514"
fix_model             = "claude-sonnet-4-20250514"
critical_fix_model    = "claude-opus-4-20250514"
fallbacks             = ["gpt-4o-mini", "ollama/qwen2.5-coder:32b"]
cross_validate_critical = true

# ─── Loop parameters ─────────────────────────────────────────────────────────
[loop]
max_cycles             = 50
cost_ceiling_usd       = 50.0
concurrency            = 4
chunk_concurrency      = 4
stall_threshold        = 2
regression_threshold   = 0.10
max_fix_attempts       = 3
parallel_fixes         = true

# ─── Chunking thresholds ─────────────────────────────────────────────────────
[chunking]
threshold_full         = 200    # < 200 lines → FULL (single chunk)
threshold_half         = 1_000  # < 1 000 lines → HALF (two chunks)
threshold_ast          = 5_000  # < 5 000 lines → AST_NODES
threshold_skeleton     = 20_000 # < 20 000 lines → SKELETON
# ≥ 20 000 lines → SKELETON_ONLY

# ─── Direct audit threshold ──────────────────────────────────────────────────
[auditing]
direct_audit_line_threshold = 5_000   # files below this are audited from source
validate_findings           = true    # run hallucination filter on LLM findings
audit_batch_size            = 20      # files per LLM audit call

# ─── Static analysis ─────────────────────────────────────────────────────────
[static_analysis]
run_ruff          = true
run_mypy          = true
run_semgrep       = true
run_bandit        = true
fail_on_warning   = false
timeout_s         = 60

# ─── Dependency graph ────────────────────────────────────────────────────────
[graph]
enabled                     = true
backend                     = "networkx"    # networkx | neo4j
min_centrality_threshold    = 0.0
# Neo4j settings (only used when backend = "neo4j")
neo4j_uri                   = "bolt://localhost:7687"
neo4j_user                  = "neo4j"
neo4j_password              = ""

# ─── Gap 1: Code Property Graph (Joern) ──────────────────────────────────────
# Joern builds a full CPG (AST + CFG + PDG) for causal context selection.
# This is the Gap 1 fix: context selection uses backward program slicing
# instead of vector similarity, finding CAUSES not just similar code.
#
# When Joern is unavailable the system falls back to hybrid BM25+dense
# retrieval — same behaviour as before Gap 1.
[cpg]
# Master switch. Set false to disable entirely and use vector search only.
enabled                    = true
# Joern server URL. Must match the joern service in docker-compose.yml.
joern_url                  = "http://localhost:8080"
# Joern project name (logical name for this codebase in Joern's workspace).
project_name               = "rhodawk"
# Path to the repository AS SEEN BY THE JOERN CONTAINER (/repo bind-mount).
# Override in .env: JOERN_REPO_PATH=/absolute/path/on/host
repo_path                  = "/repo"
# Max nodes in a backward program slice (controls context window usage).
# 50 nodes × ~10 lines each ≈ 500 lines — well within token budget.
max_slice_nodes            = 50
# Max files to include in a context slice.
max_files_in_slice         = 30
# Blast radius threshold: fixes touching >N downstream functions → human review.
# Gap 1 spec: 50.  Raise to 100+ for less conservative teams.
blast_radius_threshold     = 50
# Joern server connection timeout (seconds).
connection_timeout_s       = 10
# Per-query timeout (seconds). Increase for very large codebases.
query_timeout_s            = 120
# CPG cache TTL (seconds). CPG is stable between commits.
cache_ttl_s                = 3600

# ─── Formal verification ─────────────────────────────────────────────────────
[formal_verification]
enabled     = false        # enable for finance / medical / military
solver      = "z3"
timeout_s   = 30
# Only run formal verification when domain_mode is in this list
domains     = ["finance", "medical", "military"]

# ─── Test runner ─────────────────────────────────────────────────────────────
[test_runner]
enabled     = true         # run target repo's test suite after each fix commit
timeout_s   = 300          # 5 minutes

# ─── Brain storage ───────────────────────────────────────────────────────────
[brain]
backend               = "sqlite"
db_path               = ".stabilizer/brain.db"
vector_store_enabled  = false
vector_store_path     = ".stabilizer/vectors"
vector_embedding_model = "all-MiniLM-L6-v2"

# ─── Patrol ──────────────────────────────────────────────────────────────────
[patrol]
poll_interval_s           = 60
task_timeout_min          = 15
rejection_rate_threshold  = 0.50
cost_warn_pct             = 0.80

# ─── GitHub integration ───────────────────────────────────────────────────────
[github]
base_branch    = "main"
branch_prefix  = "stabilizer"
auto_merge     = false

# ─── API server ──────────────────────────────────────────────────────────────
[api]
host    = "0.0.0.0"
port    = 8000
reload  = false

# ─── Consensus ───────────────────────────────────────────────────────────────
[consensus]
# These match orchestrator/consensus.py DEFAULT_RULES
# Override here to raise/lower the bar per severity
critical_min_agents         = 2
critical_confidence_floor   = 0.85
critical_requires_security  = true
major_min_agents            = 2
major_confidence_floor      = 0.70
minor_min_agents            = 1
minor_confidence_floor      = 0.50
high_centrality_threshold   = 0.70
high_centrality_multiplier  = 1.20

# ─── Plugin paths ─────────────────────────────────────────────────────────────
[plugins]
paths = []
