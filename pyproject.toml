[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

[project]
name = "openmoss"
version = "1.0.0"
description = "Autonomous Multi-Agent Code Stabilizer — Military-Grade Codebase Hardening"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "OpenMOSS Contributors" }]
keywords = ["ai", "agents", "code-review", "autonomous", "llm", "github", "stabilizer"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    # Core async
    "asyncio>=3.4.3",
    "aiohttp>=3.9.0",
    "aiofiles>=23.2.1",
    # LLM clients
    "anthropic>=0.40.0",
    "litellm>=1.50.0",
    "openai>=1.50.0",
    # Structured outputs
    "instructor>=1.4.0",
    "pydantic>=2.8.0",
    "pydantic-settings>=2.4.0",
    # Database
    "aiosqlite>=0.20.0",
    "sqlalchemy[asyncio]>=2.0.0",
    # Code analysis
    "tree-sitter>=0.23.0",
    "tree-sitter-python>=0.23.0",
    "tree-sitter-javascript>=0.23.0",
    "tree-sitter-typescript>=0.23.0",
    "tree-sitter-go>=0.23.0",
    "tree-sitter-rust>=0.23.0",
    "tree-sitter-java>=0.23.0",
    "tree-sitter-cpp>=0.23.0",
    # Vector store
    "chromadb>=0.5.0",
    # GitHub
    "PyGithub>=2.3.0",
    "gitpython>=3.1.43",
    # MCP
    "mcp>=1.0.0",
    # Task queue
    "redis>=5.0.0",
    "rq>=1.16.0",
    "celery>=5.4.0",
    # CLI
    "typer>=0.12.0",
    "rich>=13.7.0",
    # Config
    "tomli>=2.0.1",
    "python-dotenv>=1.0.0",
    # Logging
    "loguru>=0.7.2",
    "structlog>=24.1.0",
    # Utilities
    "httpx>=0.27.0",
    "tenacity>=8.5.0",
    "tiktoken>=0.7.0",
    "unidiff>=0.7.5",
    "watchfiles>=0.24.0",
    "cachetools>=5.3.0",
    "xxhash>=3.4.1",
    "arrow>=1.3.0",
    "tabulate>=0.9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "pytest-mock>=3.14.0",
    "ruff>=0.5.0",
    "mypy>=1.10.0",
    "black>=24.4.0",
    "pre-commit>=3.7.0",
    "faker>=25.0.0",
    "respx>=0.21.0",
]

[project.scripts]
openmoss = "scripts.cli:app"

[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "W", "F", "I", "N", "UP", "B", "C4", "SIM", "TCH", "RUF"]
ignore = ["E501", "B008"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--cov=. --cov-report=term-missing --cov-fail-under=80"

[tool.coverage.run]
omit = ["tests/*", "scripts/*", "examples/*"]
