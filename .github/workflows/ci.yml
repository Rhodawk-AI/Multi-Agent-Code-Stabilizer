name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install PDM
        run: pip install pdm

      - name: Install dependencies
        run: pdm install --dev

      - name: Lint (ruff)
        run: pdm run ruff check .

      - name: Type check (mypy)
        run: pdm run mypy brain/ agents/ orchestrator/ utils/ sandbox/ --ignore-missing-imports

      - name: Run tests
        run: pdm run pytest tests/ -v --tb=short --cov=. --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install bandit
      - name: Security scan
        run: bandit -r brain/ agents/ orchestrator/ sandbox/ -ll -f txt

  docker:
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t rhodawk-ai-code-stabilizer:${{ github.sha }} .
      - name: Test Docker image
        run: docker run --rm rhodawk-ai-code-stabilizer:${{ github.sha }} --help
