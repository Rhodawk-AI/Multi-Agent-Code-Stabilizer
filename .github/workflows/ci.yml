name: Rhodawk AI CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      RHODAWK_JWT_SECRET: "ci_test_secret_at_least_32_chars_long_here"
      RHODAWK_AUDIT_SECRET: "ci_test_audit_secret_at_least_32_chars_long"
      RHODAWK_DEV_AUTH: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -e ".[dev]" 2>/dev/null || pip install litellm pydantic fastapi uvicorn pytest pytest-asyncio
      - name: Ruff lint
        run: python -m ruff check . --select E,F,W --ignore E501 || true
      - name: Tests
        run: pytest tests/ -q --timeout=60 --tb=short

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit
      - run: bandit -r . -x tests,.venv -ll || true

  rust-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
      - name: Build Rust MCP server
        working-directory: rust/mcp_server
        run: cargo build --release
