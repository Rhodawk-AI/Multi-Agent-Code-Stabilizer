name: MACS Core Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        
    - name: Run Core Logic PyTests (Skipping LLM Swarm Tests)
      run: |
        # We run the 30k lines of core routing, verification, and DB logic
        # We skip the heavy multi-agent tests that require 4 local LLMs (Awaiting Compute)
        pytest tests/ -v -m "not llm_heavy" --cov=orchestrator --cov=brain
